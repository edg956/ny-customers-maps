<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Maps - Navigation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.2.0/css/all.min.css"/>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 800px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: none;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 2rem;
        }
        .list-group-item {
            border-left: none;
            border-right: none;
            padding: 1rem 1.5rem;
            transition: all 0.3s ease;
        }
        .list-group-item:hover {
            background-color: #f8f9fa;
            transform: translateX(10px);
            border-left: 4px solid #667eea;
        }
        .list-group-item:first-child {
            border-top: none;
        }
        .list-group-item:last-child {
            border-bottom: none;
            border-radius: 0 0 15px 15px;
        }
        .list-group-item a {
            text-decoration: none;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 500;
        }
        .list-group-item a:hover {
            color: #667eea;
        }
        .badge {
            background-color: #667eea;
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }
        h1 {
            margin: 0;
            font-weight: 600;
        }
        .subtitle {
            opacity: 0.9;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header text-center">
                <h1><i class="fas fa-map-marked-alt"></i> Sales Maps</h1>
                <p class="subtitle mb-0">Select a map to view sales data</p>
            </div>
            <ul class="list-group list-group-flush">
                <li class="list-group-item">
                    <a href="global_sales_map.html">
                        <span><i class="fas fa-globe"></i> Global Sales Map</span>
                        <span class="badge">View</span>
                    </a>
                </li>
                <li class="list-group-item">
                    <a href="monthly_sales_map_2025_11.html">
                        <span><i class="fas fa-calendar-alt"></i> Monthly Sales - November 2025</span>
                        <span class="badge">View</span>
                    </a>
                </li>
                <li class="list-group-item">
                    <a href="monthly_sales_map_2025_12.html">
                        <span><i class="fas fa-calendar-alt"></i> Monthly Sales - December 2025</span>
                        <span class="badge">View</span>
                    </a>
                </li>
                <li class="list-group-item">
                    <a href="monthly_sales_map_2026_01.html">
                        <span><i class="fas fa-calendar-alt"></i> Monthly Sales - January 2026</span>
                        <span class="badge">View</span>
                    </a>
                </li>
                <li class="list-group-item">
                    <a href="monthly_sales_map_2026_02.html">
                        <span><i class="fas fa-calendar-alt"></i> Monthly Sales - February 2026</span>
                        <span class="badge">View</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
